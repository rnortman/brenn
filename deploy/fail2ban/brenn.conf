# Brenn fail2ban filter
#
# Matches JSON security log entries emitted by brenn-lib::obs::security::log_security_event().
# The regex depends on field order in the JSON output: "security_event" appears before "ip".
# This is stable because tracing-subscriber's JSON layer emits fields in visit order,
# and log_security_event() always emits security_event before ip.
#
# The security log uses compact JSON (no pretty-print, no spaces after colons).
# If the tracing-subscriber JSON formatter config changes, this regex must be updated.

[Definition]
failregex = "security_event"\s*:\s*true.*"ip"\s*:\s*"<HOST>"
