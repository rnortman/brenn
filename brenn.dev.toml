# Bar layout channel: latest-wins layout documents for the `bar` / `bar-pixel`
# surfaces. Durable so a reload/reboot restores the last-chosen layout snapshot
# (`retain_depth = 1`); `push_depth = 8` bounds the parked backlog. The `dev`
# app and the `bar-feeder` surface publish layout docs here; both bar surfaces
# subscribe.
[[channel]]
uuid = "81c6ecc1-9694-4f99-8a71-86a38151e9b8"
address = "bar-layout"
description = "Bar layout documents (latest-wins)"
push_depth = 8
retain_depth = 1

# Bar content channels: one per panel instance. Durable + `retain_depth = 1` so
# a reloaded panel restores the last-pushed body from the snapshot path; small
# `push_depth` bounds the parked backlog.
[[channel]]
uuid = "95ec41f3-1b8a-4239-a9e1-37af1ea8fa78"
address = "bar-a"
description = "Bar panel content channel (slot a / instance p1)"
push_depth = 8
retain_depth = 1

[[channel]]
uuid = "3120b603-6aee-4c24-b2f5-c60717149e73"
address = "bar-b"
description = "Bar panel content channel (slot b / instance p2)"
push_depth = 8
retain_depth = 1

[[channel]]
uuid = "af865273-2889-4923-9ac4-0caba3abb393"
address = "bar-c"
description = "Bar panel content channel (slot c / instance p3)"
push_depth = 8
retain_depth = 1

# Bar mode-clock config channel: the retained (`retain_depth = 1`) config for the
# `bar` surface's headless `mode-clock` instance. A publisher sends `{mode,
# schedule}`; retention replays the last config on reconnect so the surface
# resumes its last-configured dark/light behavior. Only `bar` (bench) subscribes
# — `bar-pixel` (foundry) is dark-only, so a mode-clock there would be a no-op.
[[channel]]
uuid = "15b4d94e-4589-4aa7-bbad-c850b303a713"
address = "bar-mode"
description = "Bar mode-clock config (retained, latest-wins)"
push_depth = 8
retain_depth = 1

# Bar meeting agenda channel: the personal-assistant agent publishes a full
# upcoming-meetings snapshot here (latest-wins). Durable + `retain_depth = 1` so
# a reloaded/reconnected surface replays the last snapshot and recomputes phase
# locally. Both `bar` (bench) and `bar-pixel` (foundry) subscribe — escalation
# and takeover are skin-agnostic.
[[channel]]
uuid = "2c349f30-5172-4dc9-a6ae-49b2c70ab30c"
address = "bar-agenda"
description = "Bar meeting agenda snapshot (retained, latest-wins)"
push_depth = 8
retain_depth = 1

# Bar meeting ack channel: the meeting component publishes dismiss/snooze acks
# here and subscribes to the same channel so every device converges. Durable +
# `retain_depth = 8` so a reconnecting device replays recent acks and suppresses
# already-dismissed meetings.
[[channel]]
uuid = "2ab4b43f-5adc-4d73-9bd5-c674c70195cf"
address = "bar-acks"
description = "Bar meeting dismiss/snooze acks (retained)"
push_depth = 8
retain_depth = 8

[[app]]
slug = "dev"
name = "Development"
description = "Brenn development sandbox"
icon = "🔧"
working_dir = "."
grants = ["messaging_publish"]

# The LLM write path into the bar: a `dev`-app conversation `brenn_send`s layout
# documents to `brenn:bar-layout` and panel content to `brenn:bar-a`/`-b`/`-c`,
# which the `bar` and `bar-pixel` surfaces render. The `messaging_publish` grant
# + these `brenn_publish` ACL entries authorize the durable publishes. The dev
# app also pulls the surface self-description documents (start at
# `brenn:surface.index` and follow addresses) to discover this topology.
[[app.acl.brenn_publish]]
exact = "bar-layout"

[[app.acl.brenn_publish]]
exact = "bar-a"

[[app.acl.brenn_publish]]
exact = "bar-b"

[[app.acl.brenn_publish]]
exact = "bar-c"

[[app]]
slug = "assistant"
name = "Personal Assistant"
description = "Your personal assistant"
icon = "🤖"
working_dir = "."
singleton = true
compact_reminder_pct = 60
compact_soft_pct = 75
compact_red_pct = 80
compact_hard_pct = 95
integrations = ["graf"]

[app.mcp_servers.graf]
command = "graf"
args = ["mcp"]

[[app]]
slug = "pfin"
name = "Personal Finance"
description = "Transaction import, categorization, and reconciliation"
icon = "💰"
working_dir = "."
integrations = ["pfin"]

[[app.attachment_targets]]
name = "import"
label = "Import bank export"
accept = [".ofx", ".qfx", ".csv"]
multi = true

[app.attachment_targets.handler]
type = "command"
program = "pf"
args = ["--json", "import", "{ofx}", "--csv", "{csv}"]
timeout_secs = 60
cc_instructions = """After a successful import, offer to review pending transactions using the `pending` tool.
If the import failed due to unmapped accounts, use the map_account tool to create the mapping, then ask the user to retry the import."""

[app.attachment_targets.handler.file_roles]
ofx = [".ofx", ".qfx"]
csv = [".csv"]

# Surface dev fixture: echo-stub bound to a single ephemeral channel in an echo
# loop. Pressing "send" round-trips publish -> bus -> deliver -> rendered text
# with no external publisher — a self-contained end-to-end check from
# `make launchdev` alone.
[[ephemeral_channel]]
name = "dev-stub"
retain_depth = 1
capacity = 64

[[surface]]
slug = "dev-stub"
# `alert` is required by the `noise = "alarm"` binding below: a surface whose
# binding asks for drop alerting must hold the alert plane, checked at boot.
grants = ["ephemeral_subscribe", "ephemeral_publish", "alert"]
ephemeral_subscribe_acl = [{ exact = "dev-stub" }]
ephemeral_publish_acl = [{ exact = "dev-stub" }]

[[surface.component]]
kind = "echo-stub"
abi = "dom"

# The page chrome: layout/theme/takeover/banner/toast renderer, driven entirely
# by port messages. `dev-stub` has no layout channel, so chrome renders the
# default layout. No takeover grant here, so no takeover plane binding.
[[surface.component]]
kind = "chrome"
instance = "chrome"
abi = "dom"
chrome = true

# `push_depth` is the page's port-queue depth. Every surface binding needs one
# that resolves bounded — the queue is browser memory — and an ephemeral binding
# has no [[channel]] rung to inherit from, so it is set here.
[[surface.subscription]]
channel = "ephemeral:dev-stub"
instance = "echo-stub"
port = "messages"
push_depth = 8
# The dev topology's ladder exercise: `alarm` = count + backend alert + toast on
# every observed drop. The echo loop can outrun a depth-8 queue, so overflow here
# is reachable by hand, and chrome's toast binding below renders the result. Left
# at the global `silent` default everywhere else — this is the one place the loud
# half earns its keep.
noise = "alarm"

# Chrome's control-plane bindings. `local:` channels have no [[channel]] rung, so
# each carries an explicit page-queue `push_depth`; the retained-ring depth is
# contract-fixed by the reserved table, not set here.
[[surface.subscription]]
channel = "local:brenn/theme"
instance = "chrome"
port = "theme"
push_depth = 8

[[surface.subscription]]
channel = "local:brenn/link-state"
instance = "chrome"
port = "link-state"
push_depth = 8

[[surface.subscription]]
channel = "local:brenn/surface-state"
instance = "chrome"
port = "surface-state"
push_depth = 8

[[surface.subscription]]
channel = "local:brenn/toast"
instance = "chrome"
port = "toast"
push_depth = 8

[[surface.output]]
instance = "echo-stub"
port = "out"
channel = "ephemeral:dev-stub"

# The bar: three protobar instances (p1/p2/p3), one per panel, each bound to its
# own durable content channel. The LLM picks a layout by publishing a layout
# document to `brenn:bar-layout` (the `[surface.layout]` block below) and pushes
# panel content to `brenn:bar-a`/`-b`/`-c`. Everything is durable + snapshot-
# restored, so a reload/reboot brings the bar back exactly as last left. The
# `subscribe` grant + `subscribe_acl` cover all four channels (three content +
# the layout channel); the layout subscription inherits the channel's bounded
# `retain_depth = 1` / `push_depth = 8`. Skin `bench` (1a Bench Instrument).
[[surface]]
slug = "bar"
skin = "bench"
# `subscribe` covers the content/layout/mode/agenda/ack reads; `publish` +
# `publish_acl` authorize the meeting component's ack output onto `bar-acks`;
# `takeover` lets the shell honor the meeting component's fullscreen-overlay
# request (surface-level grant, mirroring the alert plane).
grants = ["subscribe", "publish", "takeover"]
subscribe_acl = [
    { exact = "bar-a" },
    { exact = "bar-b" },
    { exact = "bar-c" },
    { exact = "bar-layout" },
    { exact = "bar-mode" },
    { exact = "bar-agenda" },
    { exact = "bar-acks" },
]
publish_acl = [{ exact = "bar-acks" }]

[[surface.component]]
kind = "protobar"
instance = "p1"
abi = "dom"

[[surface.component]]
kind = "protobar"
instance = "p2"
abi = "dom"

[[surface.component]]
kind = "protobar"
instance = "p3"
abi = "dom"

# Headless theme driver: no layout slot, so it mounts hidden and its only output
# is a `ThemeBody` on its `theme` port (bound to `local:brenn/theme` below) that
# chrome turns into the `data-theme` flip on the bench skin.
[[surface.component]]
kind = "mode-clock"
instance = "mode"
abi = "dom"

# Meeting notice: shows time-to-next-meeting and escalates to a fullscreen
# takeover. Subscribes to the agenda snapshot and the ack channel, and publishes
# its own dismiss/snooze acks back onto the ack channel.
[[surface.component]]
kind = "meeting"
instance = "meeting"
abi = "dom"

# The page chrome: owns layout (from `brenn:bar-layout`), theme, takeover stack,
# banner, and toasts. `takeover` grant present, so it binds the takeover plane.
[[surface.component]]
kind = "chrome"
instance = "chrome"
abi = "dom"
chrome = true

[[surface.subscription]]
channel = "brenn:bar-a"
instance = "p1"
port = "messages"

[[surface.subscription]]
channel = "brenn:bar-b"
instance = "p2"
port = "messages"

[[surface.subscription]]
channel = "brenn:bar-c"
instance = "p3"
port = "messages"

[[surface.subscription]]
channel = "brenn:bar-mode"
instance = "mode"
port = "config"

[[surface.subscription]]
channel = "brenn:bar-agenda"
instance = "meeting"
port = "agenda"

[[surface.subscription]]
channel = "brenn:bar-acks"
instance = "meeting"
port = "acks"

# Chrome's layout binding: the layout channel is now an ordinary durable
# subscription (inheriting the channel rung's push_depth / retain_depth = 1),
# replacing the retired special-cased [surface.layout] wiring.
[[surface.subscription]]
channel = "brenn:bar-layout"
instance = "chrome"
port = "layout"

# Chrome's control-plane bindings (local: — explicit page-queue push_depth each).
[[surface.subscription]]
channel = "local:brenn/theme"
instance = "chrome"
port = "theme"
push_depth = 8

[[surface.subscription]]
channel = "local:brenn/takeover"
instance = "chrome"
port = "takeover"
push_depth = 8

[[surface.subscription]]
channel = "local:brenn/link-state"
instance = "chrome"
port = "link-state"
push_depth = 8

[[surface.subscription]]
channel = "local:brenn/surface-state"
instance = "chrome"
port = "surface-state"
push_depth = 8

[[surface.subscription]]
channel = "local:brenn/toast"
instance = "chrome"
port = "toast"
push_depth = 8

[[surface.output]]
instance = "meeting"
port = "acks"
channel = "brenn:bar-acks"

# Meeting's takeover request/release onto the reserved takeover plane chrome
# consumes. The plane's binding requires the surface's `takeover` grant; the
# router stamps the publishing instance onto the body so it cannot be spoofed.
[[surface.output]]
instance = "meeting"
port = "takeover"
channel = "local:brenn/takeover"

# Chrome's overlay holdership onto the reserved overlay-state plane. The kernel
# reads it at the router's mint point into the surface's status report, which is
# the only place a fullscreen-wedged bar becomes visible to an operator.
[[surface.output]]
instance = "chrome"
port = "overlay-state"
channel = "local:brenn/overlay-state"

# Headless mode-clock's theme output onto the reserved theme plane chrome
# consumes. `local:` needs no publish grant/ACL (page-local; the server mediates
# no local traffic); the plane is not kernel-publish-only, so a component may
# produce it.
[[surface.output]]
instance = "mode"
port = "theme"
channel = "local:brenn/theme"

# Second bar surface, identical bindings, different skin (`foundry` = 1c Pixel
# Foundry). Same channels as `bar`, so both render the same content/layout
# side-by-side — the config-selectable skin swap and multi-surface fan-out onto
# one channel set, proven at once.
[[surface]]
slug = "bar-pixel"
skin = "foundry"
# Same meeting wiring as `bar`: `publish`/`publish_acl` for the ack output and
# `takeover` for the overlay grant. Foundry is dark-only, so no mode-clock here.
grants = ["subscribe", "publish", "takeover"]
subscribe_acl = [
    { exact = "bar-a" },
    { exact = "bar-b" },
    { exact = "bar-c" },
    { exact = "bar-layout" },
    { exact = "bar-agenda" },
    { exact = "bar-acks" },
]
publish_acl = [{ exact = "bar-acks" }]

[[surface.component]]
kind = "protobar"
instance = "p1"
abi = "dom"

[[surface.component]]
kind = "protobar"
instance = "p2"
abi = "dom"

[[surface.component]]
kind = "protobar"
instance = "p3"
abi = "dom"

[[surface.component]]
kind = "meeting"
instance = "meeting"
abi = "dom"

# The page chrome (foundry skin). Same bindings as `bar`'s chrome.
[[surface.component]]
kind = "chrome"
instance = "chrome"
abi = "dom"
chrome = true

[[surface.subscription]]
channel = "brenn:bar-a"
instance = "p1"
port = "messages"

[[surface.subscription]]
channel = "brenn:bar-b"
instance = "p2"
port = "messages"

[[surface.subscription]]
channel = "brenn:bar-c"
