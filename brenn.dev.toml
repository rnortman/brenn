# Bar feeder: the browser-driven publisher for the bar. Four echo-stub instances,
# each with an output to one of the four bar channels — three content channels
# plus the layout channel. Type a body, click send, and it publishes durably to
# that channel: content bodies to `bar-a`/`-b`/`-c`, layout JSON documents to
# `bar-layout`. Dog-foods the instance model on a second component kind and
# drives the bar end-to-end from the browser with no LLM / `dev` app in the path.
#
# `grants = ["publish"]` (→ `MessagingPublish`) + the covering `publish_acl` +
# the `[[surface.output]]` blocks are the triple durable publish requires. No
# `allowed_users` ⇒ any authenticated user may open it and publish durably. Fine
# for this single-user dev instance; a multi-user config copying this block MUST
# add `allowed_users` — durable publish persists to disk under only the
# per-connection bucket (security-posture §6.3).
[[surface]]
slug = "bar-feeder"
grants = ["publish"]
publish_acl = [
    { exact = "bar-a" },
    { exact = "bar-b" },
    { exact = "bar-c" },
    { exact = "bar-layout" },
    { exact = "bar-mode" },
    { exact = "bar-agenda" },
    { exact = "bar-acks" },
]

[[surface.component]]
kind = "echo-stub"
instance = "feed-a"
abi = "dom"

[[surface.component]]
kind = "echo-stub"
instance = "feed-b"
abi = "dom"

[[surface.component]]
kind = "echo-stub"
instance = "feed-c"
abi = "dom"

[[surface.component]]
kind = "echo-stub"
instance = "feed-layout"
