# Development configuration for Brenn.
# Usage: cargo run -- --config brenn.dev.toml serve

[server]
bind_address = "127.0.0.1:3000"
static_dir = "frontend/dist"
surface_dist_dir = "surface/dist"
secure_cookies = false
# Required once messaging is configured (the dev-stub surface below): the
# message source identifier. Matches bind_address for local dev.
public_url = "http://127.0.0.1:3000"

[database]
path = "brenn.db"

[logging]
log_dir = "logs"
console_level = "debug"
file_level = "debug"

[claude_defaults]
mcp_script_path = "noop_mcp.py"
model = "sonnet"

[integrations.graf]
command = "graf"

[integrations.pfin]
command = "pf"

# Surface error reporting: admitted warn/error surface `Log` reports republish
# onto this durable channel via the trusted in-code system publisher; a
# component panic on an alert-granted surface additionally pages. The dev
# instance runs the noop alerter (no `[alerting]` block), so the observable
# evidence is the durable message on this channel plus the `surface_guest` log
# lines — the real ntfy/mail alert leg is exercised on staging.
[observability]
surface_error_channel = "brenn:surface-errors"

# LLM surface self-description: at boot the server publishes a family of retained
# help/schema/index documents derived by convention from this prefix, as the
# reserved `system:surface-help` publisher. Any app (e.g. `dev`) pulls them with
# `MessageChannelGet` to learn which surfaces/instances/channels exist and how to
# drive each component kind — reads are ungated (topology only, no secrets);
# writes are single-writer-enforced at boot. `status_interval_secs` is the
# heartbeat cadence handed to shells for the (runtime) status snapshot.
[surface_description]
prefix = "surface"
status_interval_secs = 60

[[channel]]
uuid = "0da727fd-d0f7-414e-98e3-f1fef2ae70ca"
address = "surface-errors"
description = "Surface client error reports (trusted republish)"

# Surface self-description channels: the boot-published help/schema/index topology
