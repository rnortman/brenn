kind = "echo-stub"
instance = "feed-mode"
abi = "dom"

[[surface.component]]
kind = "echo-stub"
instance = "feed-agenda"
abi = "dom"

[[surface.component]]
kind = "echo-stub"
instance = "feed-acks"
abi = "dom"

# The page chrome. This surface is publisher-only with no layout channel, so
# chrome renders the default layout; no takeover grant, so no takeover binding.
[[surface.component]]
kind = "chrome"
instance = "chrome"
abi = "dom"
chrome = true

[[surface.subscription]]
channel = "local:brenn/theme"
instance = "chrome"
port = "theme"
push_depth = 8

[[surface.subscription]]
channel = "local:brenn/link-state"
instance = "chrome"
port = "link-state"
push_depth = 8

[[surface.subscription]]
channel = "local:brenn/surface-state"
instance = "chrome"
port = "surface-state"
push_depth = 8

[[surface.subscription]]
channel = "local:brenn/toast"
instance = "chrome"
port = "toast"
push_depth = 8

[[surface.output]]
instance = "feed-a"
port = "out"
channel = "brenn:bar-a"

[[surface.output]]
instance = "feed-b"
port = "out"
channel = "brenn:bar-b"

[[surface.output]]
