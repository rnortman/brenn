# Hermetic server configuration for the Playwright e2e harness (`make e2e`).
# Binds a non-dev port and writes all state under target/e2e so a run is fully
# isolated and `rm -rf target/e2e` gives a fresh DB every time.

[server]
# Must match E2E_BASE_URL in the Makefile `e2e` target (which polls this port).
bind_address = "127.0.0.1:3100"
static_dir = "frontend/dist"
surface_dist_dir = "surface/dist"
secure_cookies = false
public_url = "http://127.0.0.1:3100"

[database]
path = "target/e2e/brenn.db"

[logging]
log_dir = "target/e2e/logs"
console_level = "debug"
file_level = "debug"

[claude_defaults]
mcp_script_path = "noop_mcp.py"
model = "sonnet"

# At least one app is mandatory. This one exists only to satisfy config
# validation; no conversation is ever started against it in e2e, and it holds
# no grants.
[[app]]
slug = "e2e"
name = "E2E"
description = "e2e validation floor"
icon = "🧪"
working_dir = "."

# Surface error reporting (parallel to brenn.dev.toml): admitted warn/error
# surface `Log` reports republish onto this durable channel via the trusted
# in-code system publisher. The e2e harness runs the noop alerter, so the alert
# leg is covered by the native integration tests rather than the browser here.
# Durable park/drain/resume/snapshot transport is now exercised by the bar
# surfaces' reload-restores-content acceptance run (`bar.spec.ts`).
[observability]
surface_error_channel = "brenn:surface-errors"

[[channel]]
uuid = "a6e15b49-0885-4971-a036-b8d5a9ba693a"
address = "surface-errors"
description = "Surface client error reports (trusted republish)"

# Surface self-description channels: the boot-published help/schema/index topology
# derived from prefix "surface" over the three surfaces and their kinds. Each is
# retained latest-wins (standing_retain_depth = 1) so a non-subscriber
