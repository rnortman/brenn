address = "surface.surface.bar.geometry"
description = "Surface geometry: bar"
retain_depth = 1
standing_retain_depth = 1

[[channel]]
uuid = "a6a79c4b-03c7-437c-acfd-876eefa92d19"
address = "surface.surface.bar.status"
description = "Surface status: bar"
