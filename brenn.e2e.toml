standing_retain_depth = 1

[[channel]]
uuid = "5efc6991-39fe-4d31-af3a-9b550ed6a362"
address = "surface.surface.bar-pixel.geometry"
description = "Surface geometry: bar-pixel"
retain_depth = 1
standing_retain_depth = 1

[[channel]]
