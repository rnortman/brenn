# Bar channels (parallel to brenn.dev.toml): the durable layout + three panel
# content channels. Durable + `retain_depth = 1` so `bar.spec.ts` can drive the
# reload-restores-layout/content acceptance run through the snapshot path;
# `push_depth = 8` bounds the parked backlog.
[[channel]]
uuid = "3c1142e7-5a7f-4781-939a-dfaa0cc8c7a0"
address = "bar-layout"
description = "Bar layout documents (latest-wins)"
push_depth = 8
retain_depth = 1

[[channel]]
uuid = "3b2ef031-f286-42e8-a9ac-c66aade0ce0a"
address = "bar-a"
description = "Bar panel content channel (slot a / instance p1)"
push_depth = 8
retain_depth = 1

[[channel]]
uuid = "2ccd9df1-08b1-4554-9745-fc3ade11ed98"
address = "bar-b"
description = "Bar panel content channel (slot b / instance p2)"
push_depth = 8
retain_depth = 1

[[channel]]
uuid = "0d0f95db-13aa-4214-a461-aa1fbf788351"
address = "bar-c"
description = "Bar panel content channel (slot c / instance p3)"
push_depth = 8
retain_depth = 1

# The bar (parallel to brenn.dev.toml): three protobar panel instances bound to
# their own durable content channels, layout driven from `brenn:bar-layout`.
# `bar.spec.ts` drives the layout/content/reload flows against this surface.
# Skin `bench` (1a Bench Instrument).
[[surface]]
slug = "bar"
skin = "bench"
grants = ["subscribe"]
subscribe_acl = [
    { exact = "bar-a" },
    { exact = "bar-b" },
    { exact = "bar-c" },
    { exact = "bar-layout" },
]

[[surface.component]]
kind = "protobar"
instance = "p1"
abi = "dom"

[[surface.component]]
kind = "protobar"
instance = "p2"
abi = "dom"

[[surface.component]]
kind = "protobar"
instance = "p3"
abi = "dom"

# The page chrome: owns layout (from `brenn:bar-layout`), theme, banner, toasts.
# This surface carries no `takeover` grant, so chrome binds no takeover plane.
[[surface.component]]
kind = "chrome"
instance = "chrome"
abi = "dom"
chrome = true

[[surface.subscription]]
channel = "brenn:bar-a"
instance = "p1"
port = "messages"

[[surface.subscription]]
channel = "brenn:bar-b"
instance = "p2"
port = "messages"

[[surface.subscription]]
channel = "brenn:bar-c"
instance = "p3"
port = "messages"

[[surface.subscription]]
channel = "brenn:bar-layout"
instance = "chrome"
port = "layout"

[[surface.subscription]]
channel = "local:brenn/theme"
instance = "chrome"
port = "theme"
push_depth = 8

[[surface.subscription]]
channel = "local:brenn/link-state"
instance = "chrome"
port = "link-state"
push_depth = 8

[[surface.subscription]]
channel = "local:brenn/surface-state"
instance = "chrome"
port = "surface-state"
push_depth = 8

[[surface.subscription]]
channel = "local:brenn/toast"
instance = "chrome"
port = "toast"
push_depth = 8

# Second bar surface, identical bindings, `foundry` skin (1c Pixel Foundry) — the
# config-selectable skin swap proven against the same channel set.
[[surface]]
slug = "bar-pixel"
skin = "foundry"
grants = ["subscribe"]
subscribe_acl = [
    { exact = "bar-a" },
    { exact = "bar-b" },
    { exact = "bar-c" },
    { exact = "bar-layout" },
]

[[surface.component]]
kind = "protobar"
instance = "p1"
abi = "dom"

[[surface.component]]
kind = "protobar"
instance = "p2"
abi = "dom"

[[surface.component]]
kind = "protobar"
instance = "p3"
abi = "dom"

# The page chrome (foundry skin). Same bindings as `bar`'s chrome; no takeover.
[[surface.component]]
kind = "chrome"
instance = "chrome"
abi = "dom"
chrome = true

[[surface.subscription]]
channel = "brenn:bar-a"
instance = "p1"
port = "messages"

[[surface.subscription]]
channel = "brenn:bar-b"
instance = "p2"
port = "messages"

[[surface.subscription]]
channel = "brenn:bar-c"
instance = "p3"
port = "messages"

[[surface.subscription]]
channel = "brenn:bar-layout"
instance = "chrome"
port = "layout"

[[surface.subscription]]
channel = "local:brenn/theme"
instance = "chrome"
port = "theme"
push_depth = 8

[[surface.subscription]]
channel = "local:brenn/link-state"
instance = "chrome"
port = "link-state"
push_depth = 8

[[surface.subscription]]
channel = "local:brenn/surface-state"
instance = "chrome"
port = "surface-state"
push_depth = 8

[[surface.subscription]]
channel = "local:brenn/toast"
instance = "chrome"
port = "toast"
push_depth = 8

# Bar feeder: browser-driven publisher for the bar — four echo-stub instances,
# one output each onto the three content channels + the layout channel. The
# specs type bodies / layout JSON and click send to drive the bar end-to-end.
#
# `grants = ["publish"]` + covering `publish_acl` + the `[[surface.output]]`
# blocks are the durable-publish triple. No `allowed_users` ⇒ any authenticated
# user may publish durably — harmless on this hermetic loopback harness; a
# multi-user config copying this block MUST add `allowed_users`.
[[surface]]
slug = "bar-feeder"
grants = ["publish"]
publish_acl = [
    { exact = "bar-a" },
    { exact = "bar-b" },
    { exact = "bar-c" },
    { exact = "bar-layout" },
]

[[surface.component]]
kind = "echo-stub"
instance = "feed-a"
abi = "dom"

[[surface.component]]
kind = "echo-stub"
instance = "feed-b"
abi = "dom"

[[surface.component]]
kind = "echo-stub"
instance = "feed-c"
abi = "dom"

[[surface.component]]
kind = "echo-stub"
instance = "feed-layout"
abi = "dom"

# The page chrome. Publisher-only surface with no layout channel — chrome
# renders the default layout; no takeover grant, so no takeover binding.
[[surface.component]]
kind = "chrome"
instance = "chrome"
abi = "dom"
chrome = true

[[surface.subscription]]
channel = "local:brenn/theme"
instance = "chrome"
port = "theme"
push_depth = 8

[[surface.subscription]]
channel = "local:brenn/link-state"
instance = "chrome"
port = "link-state"
push_depth = 8

[[surface.subscription]]
channel = "local:brenn/surface-state"
instance = "chrome"
port = "surface-state"
push_depth = 8

[[surface.subscription]]
channel = "local:brenn/toast"
instance = "chrome"
port = "toast"
push_depth = 8

[[surface.output]]
instance = "feed-a"
port = "out"
channel = "brenn:bar-a"

[[surface.output]]
instance = "feed-b"
port = "out"
channel = "brenn:bar-b"

[[surface.output]]
instance = "feed-c"
port = "out"
channel = "brenn:bar-c"

[[surface.output]]
instance = "feed-layout"
port = "out"
channel = "brenn:bar-layout"
