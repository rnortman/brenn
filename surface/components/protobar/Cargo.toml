[package]
name = "brenn-protobar"
version = "0.1.0"
edition = "2024"
publish = false
description = "Brenn surface protobar component — subscribes to one ephemeral channel and renders message text (contract v0, receive-only)"

[lib]
crate-type = ["cdylib"]

# The DOM-free display state machine (logic.rs) is compiled and unit-tested on
# the host; its dependencies are ungated normal deps. Wasm DOM-glue deps belong
# under [target.'cfg(target_arch = "wasm32")'.dependencies].
[dependencies]
brenn-envelope = { path = "../../../brenn-envelope" }
# The DOM-free state machine (logic.rs) shares the component-support fault
# helpers, which are host-buildable, so component-support is an ungated normal
# dep. Its wasm-only helpers stay behind the crate's own cfg(wasm32) gate.
brenn-surface-component-support = { version = "0.1.0", path = "../../component-support" }
chrono = { version = "0.4.44", default-features = false, features = ["serde", "alloc"] }
# Events-only markdown: the host-tested tree builder (markdown.rs) drives the
# parser and never uses the HTML writer, so no `html` feature — the writer is
# not compiled into the wasm module. Shared workspace pin keeps it in lockstep
# with the backend's server-side renderer.
pulldown-cmark = { workspace = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.149"

[dev-dependencies]
brenn-surface-test-fixtures = { path = "../../test-fixtures" }

# The DOM glue (component.rs) is browser-only: it builds on the optional
# component-support helpers and contract v0. These deps never enter the host
# build (logic.rs and its tests carry no wasm deps).
[target.'cfg(target_arch = "wasm32")'.dependencies]
brenn-surface-proto = { version = "0.1.0", path = "../../proto" }
brenn-surface-contract = { version = "0.1.0", path = "../../contract" }
wasm-bindgen = { workspace = true }
web-sys = { workspace = true, features = [
    "Document",
    "Element",
    "HtmlElement",
    "Node",
    "Text",
    "Event",
    "EventTarget",
] }
